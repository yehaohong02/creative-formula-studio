<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="url(#gradient)"/>
  
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 公式符号 -->
  <text x="256" y="300" font-family="Arial, sans-serif" font-size="180" font-weight="bold" fill="white" text-anchor="middle">Fx</text>
  
  <!-- 装饰线条 -->
  <line x1="120" y1="340" x2="392" y2="340" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
  <line x1="150" y1="370" x2="362" y2="370" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
</svg>